name: Validate Marketplace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: JSON manifest validation
        run: |
          echo "=== Validating JSON manifests ==="
          FAIL=0

          # Validate marketplace.json
          echo "Checking .claude-plugin/marketplace.json..."
          if ! python3 -c "
          import json, sys
          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)
          assert 'name' in data, 'Missing top-level name'
          assert 'plugins' in data, 'Missing plugins array'
          for p in data['plugins']:
              assert 'name' in p, f'Plugin missing name: {p}'
              assert 'source' in p, f'Plugin missing source: {p}'
              assert 'description' in p, f'Plugin missing description: {p}'
          print(f'  PASS  marketplace.json ({len(data[\"plugins\"])} plugins)')
          "; then
            echo "  FAIL  marketplace.json"
            FAIL=1
          fi

          # Validate all plugin.json files
          for pj in plugins/*/.claude-plugin/plugin.json; do
            # Handle glob that matches nothing
            [ -f "$pj" ] || continue
            echo "Checking $pj..."
            if ! python3 -c "
          import json, sys
          with open('$pj') as f:
              data = json.load(f)
          required = ['name', 'version', 'description']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'  FAIL  $pj — missing fields: {missing}', file=sys.stderr)
              sys.exit(1)
          print(f'  PASS  $pj ({data[\"name\"]} v{data[\"version\"]})')
          "; then
              FAIL=1
            fi
          done

          # Validate all .mcp.json files
          for mj in plugins/*/.mcp.json public/.mcp.json; do
            [ -f "$mj" ] || continue
            echo "Checking $mj..."
            if ! python3 -c "
          import json, sys
          with open('$mj') as f:
              data = json.load(f)
          if 'mcpServers' not in data:
              print(f'  FAIL  $mj — missing mcpServers object', file=sys.stderr)
              sys.exit(1)
          servers = list(data['mcpServers'].keys())
          print(f'  PASS  $mj (servers: {servers})')
          "; then
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "JSON validation failed"
            exit 1
          fi
          echo ""
          echo "All JSON manifests valid"

      - name: Package availability check
        run: |
          echo "=== Checking package availability ==="
          FAIL=0

          check_npm() {
            local pkg="$1"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/$pkg")
            if [ "$http_code" = "200" ]; then
              local ver
              ver=$(curl -s "https://registry.npmjs.org/$pkg/latest" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','?'))" 2>/dev/null || echo "?")
              echo "  PASS  npm: $pkg ($ver)"
            else
              echo "  FAIL  npm: $pkg — HTTP $http_code"
              FAIL=1
            fi
          }

          check_pypi() {
            local pkg="$1"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/$pkg/json")
            if [ "$http_code" = "200" ]; then
              local ver
              ver=$(curl -s "https://pypi.org/pypi/$pkg/json" | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])" 2>/dev/null || echo "?")
              echo "  PASS  pypi: $pkg ($ver)"
            else
              echo "  FAIL  pypi: $pkg — HTTP $http_code"
              FAIL=1
            fi
          }

          # Extract package names from each plugin's .mcp.json
          for mj in plugins/*/.mcp.json; do
            [ -f "$mj" ] || continue
            plugin_dir=$(dirname "$mj")
            plugin_name=$(basename "$plugin_dir")

            # Parse the command and package from .mcp.json
            eval "$(python3 -c "
          import json
          with open('$mj') as f:
              data = json.load(f)
          for name, cfg in data.get('mcpServers', {}).items():
              cmd = cfg.get('command', '')
              args = cfg.get('args', [])
              if cmd == 'npx':
                  # Extract package name, strip -y flag and @version
                  pkg = [a for a in args if not a.startswith('-')]
                  if pkg:
                      pkg_name = pkg[0].split('@')[0] if '@' in pkg[0] and not pkg[0].startswith('@') else pkg[0].rsplit('@', 1)[0] if '@latest' in pkg[0] else pkg[0]
                      print(f'PKG_TYPE=npm; PKG_NAME={pkg_name}')
              elif cmd == 'uvx':
                  if args:
                      print(f'PKG_TYPE=pypi; PKG_NAME={args[0]}')
          ")"

            echo "Checking $plugin_name ($PKG_TYPE: $PKG_NAME)..."
            if [ "$PKG_TYPE" = "npm" ]; then
              check_npm "$PKG_NAME"
            elif [ "$PKG_TYPE" = "pypi" ]; then
              check_pypi "$PKG_NAME"
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "Package availability check failed"
            exit 1
          fi
          echo ""
          echo "All packages available"

      - name: Marketplace manifest consistency
        run: |
          echo "=== Checking marketplace consistency ==="
          FAIL=0

          # Get plugin names from marketplace.json
          MANIFEST_PLUGINS=$(python3 -c "
          import json
          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)
          for p in data['plugins']:
              print(p['name'])
          " | sort)

          # Get plugin directory names
          DIR_PLUGINS=$(ls -d plugins/*/ 2>/dev/null | xargs -I{} basename {} | sort)

          # Check for plugins in manifest but missing directories
          for name in $MANIFEST_PLUGINS; do
            if ! echo "$DIR_PLUGINS" | grep -qx "$name"; then
              echo "  FAIL  Plugin '$name' in marketplace.json but no plugins/$name/ directory"
              FAIL=1
            else
              echo "  PASS  Plugin '$name' — directory exists"
            fi
          done

          # Check for directories not in manifest
          for name in $DIR_PLUGINS; do
            if ! echo "$MANIFEST_PLUGINS" | grep -qx "$name"; then
              echo "  FAIL  Directory plugins/$name/ exists but not in marketplace.json"
              FAIL=1
            else
              echo "  PASS  Plugin '$name' — manifest entry exists"
            fi
          done

          # Check each plugin directory has required files
          for name in $DIR_PLUGINS; do
            for required in ".claude-plugin/plugin.json" ".mcp.json" "README.md"; do
              if [ ! -f "plugins/$name/$required" ]; then
                echo "  FAIL  plugins/$name/$required is missing"
                FAIL=1
              fi
            done
          done

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "Marketplace consistency check failed"
            exit 1
          fi
          echo ""
          echo "Marketplace manifest is consistent"

      - name: Link check
        run: |
          echo "=== Checking external links ==="
          FAIL=0
          CHECKED=0
          SKIPPED=0

          check_url() {
            local url="$1"
            local source="$2"

            # Skip relative links, anchors, and mailto
            case "$url" in
              ./*|../*|\#*|mailto:*) SKIPPED=$((SKIPPED + 1)); return 0 ;;
            esac

            # Skip GitHub internal repo links (same repo)
            case "$url" in
              https://github.com/regen-network/regen-ai-claude*) SKIPPED=$((SKIPPED + 1)); return 0 ;;
              https://github.com/gaiaaiagent/regen-ai-claude*) SKIPPED=$((SKIPPED + 1)); return 0 ;;
            esac

            # Skip npm/PyPI package pages — already verified in package availability step
            case "$url" in
              https://www.npmjs.com/package/*) SKIPPED=$((SKIPPED + 1)); return 0 ;;
              https://pypi.org/project/*) SKIPPED=$((SKIPPED + 1)); return 0 ;;
            esac

            CHECKED=$((CHECKED + 1))
            local http_code
            http_code=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null)
            if [ "$http_code" -ge 200 ] 2>/dev/null && [ "$http_code" -lt 400 ] 2>/dev/null; then
              echo "  PASS  $url ($http_code)"
            else
              echo "  FAIL  $url — HTTP $http_code (in $source)"
              FAIL=1
            fi
          }

          # Extract URLs from markdown files
          for md in README.md CONTRIBUTING.md; do
            [ -f "$md" ] || continue
            echo "Scanning $md..."
            # Extract URLs from markdown links [text](url) and bare URLs
            urls=$(grep -oE 'https?://[^)"> ]+' "$md" | sort -u)
            for url in $urls; do
              # Strip trailing punctuation that might be part of markdown
              url=$(echo "$url" | sed 's/[)>,;]*$//')
              check_url "$url" "$md"
            done
          done

          echo ""
          echo "Checked: $CHECKED  Skipped: $SKIPPED  Failed: $FAIL"

          if [ "$FAIL" -ne 0 ]; then
            echo "Link check failed"
            exit 1
          fi
          echo "All links valid"
